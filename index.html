<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>じゃいけん</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff66;
    font-family: monospace;
    text-align: center;
}

/* 上バー */
.top-bar {
    background: #00ff66;
    color: black;
    padding: 12px;
    font-weight: bold;
    position: relative;
}

/* 戻るボタン */
.back-btn {
    position: absolute;
    left: 10px;
    top: 10px;
    cursor: pointer;
}

/* スコア */
.score {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    font-size: 16px;
}

/* メイン */
.main {
    margin-top: 20px;
}

/* 画像 */
.main img {
    width: 220px;
    margin: 20px 0;
}

/* ボタン */
button {
    font-size: 28px;
    margin: 10px;
    padding: 15px 20px;
    border: none;
    border-radius: 10px;
    background: #00ff66;
    color: black;
    cursor: pointer;
}

button:hover {
    background: #00cc55;
}
</style>
</head>

<body>

<!-- 上バー -->
<div class="top-bar">
    <div class="back-btn" onclick="goBack()">← 戻る</div>
    じゃいけん
</div>

<!-- スコア -->
<div class="score">
    <div>シトム: <span id="enemyScore">0</span></div>
    <div>プレイヤー: <span id="playerScore">0</span></div>
</div>

<!-- メイン -->
<div class="main">

    <p id="jankenText">シトムとじゃんけんしてみよう。10点先取</p>

    <img src="SITMPlus.png">

    <div>
        <button onclick="playJanken('グー')">✊</button>
        <button onclick="playJanken('チョキ')">✌️</button>
        <button onclick="playJanken('パー')">✋</button>
    </div>

</div>

<script src="janken.js"></script>

<script>
function goBack(){
    window.history.back();
}
</script>

</body>
</html>
